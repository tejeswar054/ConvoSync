<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <ul id="userList"></ul>

  <div class="chat-container">

    <div class="chat-header">
      <h2 id="chatWith"></h2>
      <p id = "status"></p>
      <p id="typing"></p>
    </div>

    <div id="messages" class="chat-box"></div>

    <div class="chat-input">
      <input id="msg" placeholder="Type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

  </div>

  <script src="http://localhost:3000/socket.io/socket.io.js"></script>

  <script>
  const userId = prompt("enter your userId:")
  if (!userId){
    alert("userId is required");
    throw new Error("userid is missing");
  }
  let receiverId = null;


  const socket = io("http://localhost:3000",{
    auth:{userId}
  });
  socket.emit("get_users");
  let unreadCounts = {};

  function updateUserListUI(users = null) {
    const list = document.getElementById("userList");
    if (users) list.innerHTML = "";
    const items = users || Array.from(list.children).map(li => li.dataset.user);
    list.innerHTML = "";
    items.forEach(user => {
      const li = document.createElement("li");
      li.textContent = user;
      li.dataset.user = user;
      if (unreadCounts[user]) {
        li.textContent += ` (${unreadCounts[user]})`;
      }
      if (user === receiverId) {
        li.classList.add("active-user");
      }
      li.onclick = () => {
        receiverId = user;
        unreadCounts[user] = 0;
        document.querySelectorAll("#userList li").forEach(el => {
          el.classList.remove("active-user");
        });
        li.classList.add("active-user");
        document.getElementById("messages").innerHTML = "";
        document.getElementById("chatWith").textContent = "Chat with " + receiverId;
        document.getElementById("typing").textContent = "";
        document.getElementById("status").textContent = "";
        socket.emit("load_messages", { to: receiverId });
        socket.emit("get_users_status");
        updateUserListUI(items);
      };
      list.appendChild(li);
    });
  }

  const input = document.getElementById("msg");
  let isTyping = false;
  let typingTimeout;

  input.addEventListener("input", () => {
    if (!receiverId) return;
    if (!isTyping){
      socket.emit("typing", {
        to: receiverId
      });
      isTyping = true;
    }
    

    clearTimeout(typingTimeout);

    typingTimeout = setTimeout(() => {
      socket.emit("stop_typing", {
        to: receiverId
      });
      isTyping = false;
    }, 1000);
  });

  function sendMessage() {
    const msg = document.getElementById("msg").value;
    socket.emit("send_message", {
      to : receiverId,
      message:msg
    });
    socket.emit("stop_typing",{to:receiverId});
    document.getElementById("msg").value = "";
  }

  socket.on("receive_message", (msg) => {
    const isCurrentChat =
      receiverId &&
      (
        (msg.from === userId && msg.to === receiverId) ||
        (msg.from === receiverId && msg.to === userId)
      );
    if (isCurrentChat) {
      const div = document.createElement("div");
      div.classList.add("message");
      if (msg.from === userId) {
        div.classList.add("sent");
      } else {
        div.classList.add("received");
      }
      div.textContent = msg.message;
      document.getElementById("messages").appendChild(div);
      const chatBox = document.getElementById("messages");
      chatBox.scrollTop = chatBox.scrollHeight;
      if (msg.from !== userId) {
        socket.emit("message_read", { from: msg.from });
      }
    } else {
      if (msg.from !== userId) {
        unreadCounts[msg.from] = (unreadCounts[msg.from] || 0) + 1;
        updateUserListUI();
      }
    }
  });
  socket.on("user_status",(data) =>{
    if (data.userId !== receiverId) return ;
    const statusEl = document.getElementById("status");
    if (data.status === "online"){
      statusEl.textContent = "Online 🟢";
    }else {
      statusEl.textContent = "Last seen: " + new Date(data.lastSeen).toLocaleTimeString();
    }
  });

  socket.on("all_users_status", (data) => {

    const statusEl = document.getElementById("status");

    if (data.onlineUsers[receiverId]) {
      statusEl.textContent = "Online 🟢";
    } else if (data.lastSeen[receiverId]) {
      statusEl.textContent =
        "Last seen: " + new Date(data.lastSeen[receiverId]).toLocaleTimeString();
    } else {
      statusEl.textContent = "Offline 🔴";
    }

  });

  socket.on("typing", (data) => {
    if (data.from !== receiverId) return;
    document.getElementById("typing").textContent = receiverId + " is typing...";
  });

  socket.on("stop_typing", (data) => {
    if (data.from !== receiverId) return;
    document.getElementById("typing").textContent = "";
  });

  socket.on("user_list", (users) => {
    updateUserListUI(users);
  });
  </script>

</body>
</html>
